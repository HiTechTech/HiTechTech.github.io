        <p>程序流程为：完成初始化后每隔 1 秒读取当前时间并通过串口发送给PC串口助手。下载程序上电后，一直显示设置的时间，不走时。很是疑惑，查阅资料后觉得可能是因为没读取日期，加了读日期语句后验证，果不其然。</p>
<p>PS:必须先读时间，再读日期，否则也会出现不走时问题。</p>
