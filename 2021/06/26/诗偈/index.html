        <p>一年复一年。形容渐渐迁。骨髓徐枯竭。眉毛看渐穿。<br>幻身如聚沬。四大岂能坚。五欲蔽三界。何时见性天。<br>一月复一月。光阴似消雪。无常有限分。法性无生灭。<br>漆桶忽尔破。天龙生欢悦。鹤巢鹏不居。鹪鹩住蚊睫。<br>一日复一日。切莫较得失。取舍忘分别。一切总非实。<br>处处要圆融。时时宜朴实。一气走到家。端坐空王室。<br>一时复一时。步步向前移。相逢各一笑。谁与尔拖尸。<br>兀兀常不倦。时时念在兹。少壮当努力。莫待老衰时。</p>
